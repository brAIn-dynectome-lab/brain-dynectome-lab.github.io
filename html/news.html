    /* Sticky Footer Fix */
    body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
    .main-content { flex: 1; margin-top: 120px; }
    .footer { margin-top: auto; }
    .news {
        max-height: 60vh;        /* 60% of viewport height */
        overflow-y: auto;        /* Vertical scroll only */
        padding-right: 10px;     /* Space for scrollbar */
        scrollbar-width: thin;   /* Firefox: thin scrollbar */
        scrollbar-color: #007cba #f8f9fa;  /* Firefox: custom colors */
        }

        /* Webkit browsers (Chrome/Safari) custom scrollbar */
        .news::-webkit-scrollbar {
        width: 8px;
        }
        .news::-webkit-scrollbar-track {
        background: #f8f9fa;
        border-radius: 4px;
        }
        .news::-webkit-scrollbar-thumb {
        background: #007cba;
        border-radius: 4px;
        }
        .news::-webkit-scrollbar-thumb:hover {
        background: #005a8b;
        }
  </style>
